<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment</title>

    <style>
        body {
            font-family: 'Comic Sans MS';
            background: linear-gradient(to right, #a1c4fd, #c2e9fb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0px 0px 20px lightblue;
            text-align: center;
            width: 300px;
            animation: fadeIn 1s ease-in-out;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            background: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        @keyframes fadeIn {
            from {opacity:0;}
            to {opacity:1;}
        }
    </style>
</head>

<body>

<div class="box">
    <h2>📅 Book Appointment</h2>

    <form method="POST">

        <label>Date 📅</label>
        <input type="date" name="date" required>

        <label>Time ⏰</label>
        <input type="time" name="time" required>

        <label>Problem 📝</label>
        <textarea name="problem" required></textarea>

        <button type="submit">✨ Confirm Booking</button>
    </form>

    <br>
    <a href="/doctors">⬅ Back</a>

</div>

</body>
</html>
