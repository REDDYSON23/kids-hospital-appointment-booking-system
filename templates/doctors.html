<!DOCTYPE html>
<html>
<head>
<title>Doctors</title>

<style>
body {
  margin: 0;
  font-family: Comic Sans MS;
  background: url('/static/images/doctors.png');
  background-size: cover;
}

/* Back button */
.back {
  position: absolute;
  top: 20px;
  left: 20px;
  background: lightgreen;
  padding: 10px;
  border-radius: 10px;
  text-decoration: none;
  color: black;
}

/* Container */
.container {
  text-align: center;
  padding-top: 80px;
}

/* Cards */
.card {
  display: inline-block;
  width: 220px;
  margin: 15px;
  padding: 15px;
  background: rgba(255,255,255,0.9);
  border-radius: 15px;
  box-shadow: 0px 0px 15px pink;
  animation: float 3s infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

button {
  margin-top: 10px;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  background: lightblue;
  cursor: pointer;
}
</style>

</head>

<body>

<a href="/dashboard" class="back">⬅ Back</a>

<div class="container">

<h2>👨‍⚕️ Our Lovely Doctors 🧸</h2>

{% for d in doctors %}
  <div class="card">
    <h3>{{d[1]}}</h3>

    <a href="/book/{{d[0]}}">
      <button>📅 Book Appointment</button>
    </a>
  </div>
{% endfor %}

</div>

</body>
</html>
